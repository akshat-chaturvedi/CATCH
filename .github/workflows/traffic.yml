name: Track GitHub Traffic

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:      # lets you run manually too

jobs:
  traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch traffic data
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/views \
               > views.json

          curl -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/${{ github.repository }}/traffic/clones \
               > clones.json

      - name: Save to CSV
        run: |
          echo "$(date),$(jq '.count' views.json),$(jq '.uniques' views.json)" >> views.csv
          echo "$(date),$(jq '.count' clones.json),$(jq '.uniques' clones.json)" >> clones.csv

      - name: Commit data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.csv
          git commit -m "Update traffic data" || echo "No changes"
          git push
